name: "Book Friday Class"

on:
  schedule:
    - cron: '0 11 * * 6'  # Saturday 6:00 AM EST / 7:00 AM EDT
  workflow_dispatch: {}

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r requirements.txt

      - run: playwright install chromium --with-deps

      - run: cp config.example.py config.py

      - run: python book_classes.py next friday --fallback --strict
        env:
          COREPOWER_EMAIL: ${{ secrets.COREPOWER_EMAIL }}
          COREPOWER_PASSWORD: ${{ secrets.COREPOWER_PASSWORD }}
          STUDIO_LOCATION: ${{ secrets.STUDIO_LOCATION }}
          CLASSES_TO_BOOK: ${{ secrets.CLASSES_TO_BOOK }}
          TZ: America/New_York

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-friday
          path: screenshots/
          retention-days: 7
