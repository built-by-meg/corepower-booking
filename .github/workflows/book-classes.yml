name: Book CorePower Classes

on:
  schedule:
    - cron: '0 11 * * 0'  # Every Sunday at 11:00 UTC (6:00 AM ET)
  workflow_dispatch: {}

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r requirements.txt

      - run: playwright install chromium --with-deps

      - run: python book_classes.py
        env:
          COREPOWER_EMAIL: ${{ secrets.COREPOWER_EMAIL }}
          COREPOWER_PASSWORD: ${{ secrets.COREPOWER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: screenshots/
